<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rimborso sorella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF; --surface: #FFFFFF; --border: #E2DDD6; --border-strong: #C8C2B8;
    --text: #1C1A17; --text-muted: #7A7670; --text-faint: #B0ABA4;
    --green: #2D6A4F; --green-bg: #EAF4EF; --red: #8B2E2E; --red-bg: #F9ECEC;
    --accent: #3D5A80; --accent-bg: #EBF0F7;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page { max-width: 480px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  h1 { font-family: var(--mono); font-weight: 300; font-size: 22px; letter-spacing: -0.02em; }
  h1 span { color: var(--text-faint); font-size: 13px; font-weight: 400; display: block; margin-top: 4px; font-family: var(--sans); }
  .tabs { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; background: var(--surface); }
  .tab { flex: 1; padding: 10px 8px; font-size: 13px; font-family: var(--sans); color: var(--text-muted); background: transparent; border: none; border-right: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--text); color: #fff; font-weight: 500; }
  .panel { display: none; } .panel.active { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 0.75rem; }
  .big-num { font-family: var(--mono); font-size: 36px; font-weight: 300; line-height: 1; margin-bottom: 0.5rem; }
  .progress-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 10px 0 6px; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
  .progress-note { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric { background: var(--bg); border-radius: 8px; padding: 0.75rem; }
  .metric-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .metric-val { font-family: var(--mono); font-size: 20px; font-weight: 400; }
  .metric-val.green { color: var(--green); }
  .field-group { display: flex; flex-direction: column; gap: 8px; }
  .field-row { display: flex; gap: 8px; }
  input, select { flex: 1; min-width: 0; padding: 9px 12px; font-size: 14px; font-family: var(--sans); color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; outline: none; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--border-strong); background: var(--surface); }
  input::placeholder { color: var(--text-faint); }
  button.primary { padding: 9px 18px; font-size: 14px; font-family: var(--sans); font-weight: 500; color: #fff; background: var(--text); border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  button.primary:hover { opacity: 0.85; } button.primary:active { opacity: 0.7; }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .log-list { display: flex; flex-direction: column; }
  .log-item { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-item:last-child { border-bottom: none; }
  .log-date { font-family: var(--mono); font-size: 11px; color: var(--text-faint); white-space: nowrap; }
  .log-desc { color: var(--text); }
  .log-tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; white-space: nowrap; display: inline-block; margin-top: 3px; }
  .tag-risparmio { background: var(--accent-bg); color: var(--accent); }
  .tag-spesa { background: var(--green-bg); color: var(--green); }
  .tag-restituito { background: var(--green-bg); color: var(--green); }
  .tag-mamma { background: #FEF3E2; color: #7A4F10; }
  .tag-init { background: var(--bg); color: var(--text-muted); }
  .log-amount { font-family: var(--mono); font-size: 13px; font-weight: 500; white-space: nowrap; }
  .log-amount.pos { color: var(--green); } .log-amount.neg { color: var(--red); } .log-amount.neu { color: var(--text-muted); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 18px; padding: 2px 4px; line-height: 1; border-radius: 4px; transition: color 0.15s; }
  .del-btn:hover { color: var(--red); }
  .empty { text-align: center; color: var(--text-faint); font-size: 13px; padding: 2rem 0; }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); padding: 4px 0; }
  .info-row strong { font-family: var(--mono); font-weight: 400; color: var(--text); }
  .status { font-size: 12px; color: var(--text-faint); text-align: right; margin-bottom: 0.5rem; }
  .status.ok { color: var(--green); } .status.err { color: var(--red); }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>rimborso sorella <span>tracker personale</span></h1>
  </header>
  <div class="status" id="status">connessione in corso...</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('debito')">debito</button>
    <button class="tab" onclick="showTab('mamma')">fondo mamma</button>
    <button class="tab" onclick="showTab('storico')">storico</button>
  </div>

  <div class="panel active" id="panel-debito">
    <div class="card">
      <div class="card-label">debito residuo</div>
      <div class="big-num" id="debito-display">€0,00</div>
      <div class="progress-wrap"><div class="progress-fill" id="debito-progress" style="width:0%"></div></div>
      <div class="progress-note" id="debito-note"></div>
    </div>
    <div class="card">
      <div class="card-label">imposta importo iniziale</div>
      <div class="field-row">
        <input type="number" id="debito-init" placeholder="es. 1500" min="0" step="0.01">
        <button class="primary" onclick="setDebito()">imposta</button>
      </div>
      <div style="font-size:12px;color:var(--text-faint);margin-top:8px">attenzione: reimpostare azzera il contatore</div>
    </div>
    <div class="card">
      <div class="card-label">aggiungi movimento</div>
      <div class="field-group">
        <select id="tipo-mov">
          <option value="risparmio">metto via (risparmio)</option>
          <option value="spesa">spesa per lei</option>
          <option value="restituito">restituito direttamente</option>
        </select>
        <div class="field-row">
          <input type="number" id="mov-amount" placeholder="importo €" min="0" step="0.01">
          <input type="text" id="mov-desc" placeholder="nota" style="flex:1.5">
        </div>
        <button class="primary" onclick="addMovimento()">aggiungi</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-mamma">
    <div class="card">
      <div class="grid2">
        <div class="metric">
          <div class="metric-label">accumulato</div>
          <div class="metric-val green" id="fondo-tot">€0,00</div>
        </div>
        <div class="metric">
          <div class="metric-label">mesi versati</div>
          <div class="metric-val" id="fondo-mesi">0</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">quota mensile</div>
      <div class="info-row">quota attuale <strong id="quota-display">€200,00</strong></div>
      <div class="field-row" style="margin-top:10px">
        <input type="number" id="quota-input" placeholder="nuova quota" min="0">
        <button class="primary" onclick="setQuota()">salva</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">registra versamento</div>
      <div class="field-group">
        <input type="number" id="vers-extra" placeholder="importo (vuoto = quota mensile)">
        <input type="text" id="vers-nota" placeholder="nota opzionale">
        <button class="primary" onclick="addVersamento()">registra</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-storico">
    <div class="card">
      <div class="card-label">tutti i movimenti</div>
      <div class="log-list" id="log-list"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qnhnsjqzheyiacfmmmbe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuaG5zanF6aGV5aWFjZm1tbWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODEyMjMsImV4cCI6MjA5NDk1NzIyM30.Y0XwmMed7pRlBPmMpCpmgfdppTEUI0-FIKXOWbaRuYk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let S = { debito_iniziale: 0, debito_residuo: 0, quota_mensile: 200, fondo_tot: 0 };
let logs = [];

function fmt(n) {
  return '€' + Math.abs(n||0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function today() {
  return new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' });
}
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

async function loadConfig() {
  const { data, error } = await sb.from('rimborso_config').select('*').eq('id', 1).single();
  if (error) { setStatus('errore connessione', 'err'); return; }
  S = data;
  setStatus('sincronizzato ✓', 'ok');
  render();
}

async function loadLogs() {
  const { data, error } = await sb.from('rimborso_log').select('*').order('created_at', { ascending: false });
  if (error) return;
  logs = data;
  renderLog();
}

async function saveConfig() {
  const { error } = await sb.from('rimborso_config').update({
    debito_iniziale: S.debito_iniziale,
    debito_residuo: S.debito_residuo,
    quota_mensile: S.quota_mensile,
    fondo_tot: S.fondo_tot
  }).eq('id', 1);
  if (error) setStatus('errore salvataggio', 'err');
  else setStatus('salvato ✓', 'ok');
}

async function addLog(tipo, descrizione, delta) {
  const { error } = await sb.from('rimborso_log').insert({ data: today(), tipo, descrizione, delta });
  if (!error) loadLogs();
}

function render() {
  const res = Math.max(0, S.debito_residuo);
  document.getElementById('debito-display').textContent = fmt(res);
  const pct = S.debito_iniziale > 0 ? Math.max(0, Math.min(100, (1 - S.debito_residuo / S.debito_iniziale) * 100)) : 0;
  document.getElementById('debito-progress').style.width = pct.toFixed(1) + '%';
  const pagato = Math.max(0, S.debito_iniziale - S.debito_residuo);
  document.getElementById('debito-note').textContent = S.debito_iniziale > 0
    ? fmt(pagato) + ' restituiti su ' + fmt(S.debito_iniziale) + ' (' + pct.toFixed(0) + '%)'
    : '';
  document.getElementById('quota-display').textContent = fmt(S.quota_mensile);
  document.getElementById('fondo-tot').textContent = fmt(S.fondo_tot);
  const mesi = logs.filter(l => l.tipo === 'mamma').length;
  document.getElementById('fondo-mesi').textContent = mesi;
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!logs.length) { el.innerHTML = '<div class="empty">nessun movimento registrato</div>'; return; }
  const tagMap = {
    risparmio: ['tag-risparmio', 'risparmio'],
    spesa: ['tag-spesa', 'spesa per lei'],
    restituito: ['tag-restituito', 'restituito'],
    mamma: ['tag-mamma', 'fondo mamma'],
    init: ['tag-init', 'debito iniziale']
  };
  el.innerHTML = logs.map(l => {
    const [tagClass, tagLabel] = tagMap[l.tipo] || ['tag-init', l.tipo];
    const d = parseFloat(l.delta);
    const amtClass = d > 0 ? 'pos' : d < 0 ? 'neg' : 'neu';
    const amtText = d === 0 ? '' : (d > 0 ? '+' : '') + fmt(d);
    return `<div class="log-item">
      <span class="log-date">${l.data}</span>
      <span class="log-desc">${l.descrizione}<br><span class="log-tag ${tagClass}">${tagLabel}</span></span>
      <span class="log-amount ${amtClass}">${amtText}</span>
      <button class="del-btn" onclick="delLog(${l.id})" title="elimina">×</button>
    </div>`;
  }).join('');
  render();
}

async function setDebito() {
  const v = parseFloat(document.getElementById('debito-init').value);
  if (isNaN(v) || v < 0) { alert('importo non valido'); return; }
  S.debito_iniziale = v; S.debito_residuo = v;
  await saveConfig();
  await addLog('init', 'debito iniziale impostato: ' + fmt(v), 0);
  document.getElementById('debito-init').value = '';
  render();
}

async function addMovimento() {
  const tipo = document.getElementById('tipo-mov').value;
  const amt = parseFloat(document.getElementById('mov-amount').value);
  const nota = document.getElementById('mov-desc').value.trim();
  if (isNaN(amt) || amt <= 0) { alert('importo non valido'); return; }
  let desc = nota || (tipo === 'risparmio' ? 'messo da parte' : tipo === 'spesa' ? 'spesa per sorella' : 'restituito');
  let delta = 0;
  if (tipo === 'spesa' || tipo === 'restituito') {
    S.debito_residuo = Math.max(0, S.debito_residuo - amt);
    delta = -amt;
  } else {
    delta = amt;
  }
  await saveConfig();
  await addLog(tipo, desc, delta);
  document.getElementById('mov-amount').value = '';
  document.getElementById('mov-desc').value = '';
  render();
}

async function setQuota() {
  const v = parseFloat(document.getElementById('quota-input').value);
  if (isNaN(v) || v < 0) { alert('importo non valido'); return; }
  S.quota_mensile = v;
  await saveConfig();
  document.getElementById('quota-input').value = '';
  render();
}

async function addVersamento() {
  const extra = document.getElementById('vers-extra').value;
  const nota = document.getElementById('vers-nota').value.trim();
  const amt = extra ? parseFloat(extra) : S.quota_mensile;
  if (isNaN(amt) || amt <= 0) { alert('importo non valido'); return; }
  S.fondo_tot += amt;
  await saveConfig();
  await addLog('mamma', nota || 'versamento mensile fondo mamma', amt);
  document.getElementById('vers-extra').value = '';
  document.getElementById('vers-nota').value = '';
  render();
}

async function delLog(id) {
  if (!confirm('Eliminare questo movimento?')) return;
  const log = logs.find(l => l.id === id);
  if (!log) return;
  const d = parseFloat(log.delta);
  if (log.tipo === 'spesa' || log.tipo === 'restituito') S.debito_residuo = Math.min(S.debito_iniziale, S.debito_residuo + Math.abs(d));
  if (log.tipo === 'mamma') S.fondo_tot = Math.max(0, S.fondo_tot - Math.abs(d));
  await sb.from('rimborso_log').delete().eq('id', id);
  await saveConfig();
  loadLogs();
  render();
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['debito','mamma','storico'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}

async function init() {
  await loadConfig();
  await loadLogs();
}

init();
</script>
</body>
</html>
